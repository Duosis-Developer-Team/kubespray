---
# ============================================================
#  group_vars/all/all.yml
#  Ortam: apm-test cluster / blt.vc
# ============================================================

## HA Load Balancer — Keepalived + HAProxy
## Kubespray bu kurulumu otomatik yapar
loadbalancer_apiserver:
  address: 10.134.16.69    # VIP
  port: 6443

loadbalancer_apiserver_localhost: false

## Keepalived NIC adı — ens192 (tüm node'larda aynı)
kube_vip_iface: ens192
keepalived_interface: ens192

kube_apiserver_bind_address: 0.0.0.0

## NTP
ntp_enabled: true
ntp_manage_config: true
ntp_servers:
  - pool.ntp.org

## Ansible bağlantı
ansible_user: root
ansible_ssh_private_key_file: ~/.ssh/id_rsa
ansible_python_interpreter: /usr/bin/python3

## Upstream DNS
upstream_dns_servers:
  - 8.8.8.8
  - 8.8.4.4
